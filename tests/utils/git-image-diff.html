<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Image Diff</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #151923; color: #e7eaf0; display: flex; height: 100vh; overflow: hidden; }
  button, input { font: inherit; }
  .sidebar { width: 340px; min-width: 340px; background: #10151f; border-right: 1px solid #263247; display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #263247; }
  .sidebar-header h2 { font-size: 14px; color: #7dd3fc; margin-bottom: 8px; }
  .stats { font-size: 12px; color: #96a0b5; line-height: 1.45; }
  .sidebar-filter { padding: 10px 16px; border-bottom: 1px solid #263247; display: grid; gap: 8px; }
  .sidebar-filter input[type="text"] { width: 100%; padding: 7px 10px; background: #151923; border: 1px solid #33415c; color: #e7eaf0; border-radius: 4px; font-size: 13px; outline: none; }
  .sidebar-filter input[type="text"]:focus { border-color: #7dd3fc; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; color: #96a0b5; font-size: 12px; user-select: none; }
  .sidebar-list { flex: 1; overflow-y: auto; }
  .group { border-bottom: 1px solid #263247; }
  .group-header { padding: 8px 14px; font-size: 12px; color: #7dd3fc; background: #151923; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1; display: flex; align-items: center; gap: 8px; }
  .group-header.collapsed + .group-items { display: none; }
  .group-header .arrow { width: 10px; color: #96a0b5; }
  .group-header.collapsed .arrow { transform: rotate(-90deg); }
  .item { padding: 7px 14px 7px 30px; font-size: 12px; cursor: pointer; transition: background 0.12s; display: grid; gap: 3px; }
  .item:hover { background: #1d2533; }
  .item.active { background: #263247; color: #fff; }
  .item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-path { color: #96a0b5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-status { display: flex; gap: 6px; align-items: center; }
  .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 1px 7px; font-size: 10px; line-height: 16px; background: #263247; color: #cbd5e1; border: 1px solid #33415c; text-transform: uppercase; letter-spacing: 0.03em; }
  .badge.added, .badge.untracked { background: #0f3328; border-color: #1f7a58; color: #8ee0c0; }
  .badge.deleted { background: #3a161d; border-color: #96374c; color: #ff9aac; }
  .badge.modified { background: #33280f; border-color: #7a601f; color: #f5d77d; }
  .badge.renamed, .badge.copied { background: #132b3f; border-color: #2b76a6; color: #9bdcff; }
  .badge.staged { background: #1b315f; border-color: #315aa3; color: #bcd2ff; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: #10151f; border-bottom: 1px solid #263247; flex-wrap: wrap; }
  .title { flex: 1; min-width: 260px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav, .modes { display: flex; gap: 4px; }
  .toolbar button { padding: 5px 10px; font-size: 12px; background: #151923; border: 1px solid #33415c; color: #e7eaf0; cursor: pointer; border-radius: 4px; }
  .toolbar button:hover:not(:disabled) { border-color: #7dd3fc; }
  .toolbar button.active { background: #7dd3fc; border-color: #7dd3fc; color: #07111f; }
  .toolbar button:disabled { opacity: 0.45; cursor: default; }
  .git-add { background: #166534 !important; border-color: #22a055 !important; color: #fff !important; font-weight: 700; }
  .git-add:hover:not(:disabled) { background: #1f7a43 !important; }
  .git-add.staged { background: #263247 !important; border-color: #33415c !important; color: #96a0b5 !important; }
  .diff-info { font-size: 12px; padding: 4px 9px; border-radius: 4px; font-weight: 700; white-space: nowrap; color: #96a0b5; }
  .diff-info.identical { color: #7ddc9f; }
  .diff-info.minor { color: #f5d77d; }
  .diff-info.major { color: #ff9aac; }
  .compare-area { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
  .empty { color: #96a0b5; text-align: center; line-height: 1.7; }
  .slider-stack { display: inline-flex; flex-direction: column; gap: 8px; align-items: stretch; }
  .slider-percentages { display: flex; justify-content: space-between; align-items: center; color: #cbd5e1; font-size: 12px; font-weight: 700; }
  .slider-percentages span { background: #10151f; border: 1px solid #263247; border-radius: 4px; padding: 4px 9px; }
  .slider-container { position: relative; display: inline-block; cursor: col-resize; user-select: none; }
  .slider-container img { display: block; max-width: 78vw; max-height: 78vh; image-rendering: pixelated; }
  .after-wrap { position: absolute; top: 0; left: 0; height: 100%; overflow: hidden; pointer-events: none; }
  .after-wrap img { display: block; image-rendering: pixelated; }
  .slider-line { position: absolute; top: 0; height: 100%; width: 2px; background: #7dd3fc; pointer-events: none; z-index: 2; }
  .slider-handle { position: absolute; top: 50%; width: 32px; height: 32px; margin-top: -16px; margin-left: -16px; background: #7dd3fc; border-radius: 50%; z-index: 3; pointer-events: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(125,211,252,0.45); }
  .slider-handle::before { content: "<>"; color: #07111f; font-size: 12px; font-weight: 700; }
  .sidebyside { display: flex; align-items: flex-start; justify-content: center; gap: 18px; width: 100%; }
  .panel { min-width: 0; text-align: center; }
  .panel-label { color: #96a0b5; font-size: 12px; padding: 0 0 8px; }
  .panel img { max-width: 39vw; max-height: 78vh; image-rendering: pixelated; display: block; background: #0b0f16; }
  .missing { width: min(39vw, 520px); height: min(50vh, 360px); border: 1px dashed #46546d; color: #96a0b5; display: flex; align-items: center; justify-content: center; background: #10151f; padding: 20px; }
  .blink-stack { display: inline-flex; flex-direction: column; gap: 10px; align-items: stretch; }
  .blink-bar { display: flex; justify-content: space-between; align-items: center; color: #cbd5e1; font-size: 12px; gap: 12px; }
  .blink-label { background: #10151f; border: 1px solid #263247; border-radius: 4px; padding: 4px 9px; font-weight: 700; min-width: 60px; text-align: center; }
  .blink-label.before { color: #ff9aac; border-color: #6c2336; }
  .blink-label.after { color: #8ee0c0; border-color: #1f7a58; }
  .blink-controls { display: flex; gap: 4px; align-items: center; }
  .blink-controls button { padding: 4px 9px; font-size: 12px; background: #151923; border: 1px solid #33415c; color: #e7eaf0; cursor: pointer; border-radius: 4px; }
  .blink-controls button:hover { border-color: #7dd3fc; }
  .blink-controls button.active { background: #7dd3fc; border-color: #7dd3fc; color: #07111f; }
  .blink-stage { position: relative; display: inline-block; }
  .blink-stage img { display: block; max-width: 78vw; max-height: 70vh; image-rendering: pixelated; background: #0b0f16; }
  .blink-stage img.after-img { position: absolute; top: 0; left: 0; }
  .blink-stage.show-before .after-img { visibility: hidden; }
  .blink-stage:not(.show-before) .before-img { visibility: hidden; }
  .kbd { position: fixed; right: 12px; bottom: 12px; color: #6e7890; font-size: 11px; }
  .kbd kbd { background: #10151f; border: 1px solid #263247; border-radius: 3px; padding: 1px 5px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header">
    <h2>Git Image Diff</h2>
    <div class="stats" id="stats">Loading...</div>
  </div>
  <div class="sidebar-filter">
    <input type="text" id="filter" placeholder="Filter changed images...">
    <label class="checkbox-row"><input type="checkbox" id="hide-staged" checked> Hide staged</label>
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</aside>

<main class="main">
  <div class="toolbar">
    <div class="title" id="current-title">Select an image</div>
    <div class="nav">
      <button id="prev-btn">Prev</button>
      <button id="next-btn">Next</button>
    </div>
    <div class="modes">
      <button class="active" data-mode="slider">Slider</button>
      <button data-mode="sidebyside">Side by Side</button>
      <button data-mode="blink">Blink</button>
    </div>
    <span class="diff-info" id="diff-info"></span>
    <button class="git-add" id="git-add-btn" disabled>Git Add</button>
    <button id="refresh-btn">Refresh</button>
  </div>
  <div class="compare-area" id="compare-area">
    <div class="empty">Loading changed images...</div>
  </div>
</main>

<div class="kbd">
  <kbd>J</kbd>/<kbd>K</kbd> navigate &nbsp; <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> view &nbsp; <kbd>Space</kbd> pause blink &nbsp; <kbd>G</kbd> git add &nbsp; <kbd>/</kbd> filter
</div>

<script>
let changes = [];
let filtered = [];
let currentIndex = -1;
let mode = "slider";
let blinkTimer = null;
let blinkSpeed = 500;
let blinkPaused = false;
let blinkShowingBefore = true;
const diffCache = new Map();

const els = {
  stats: document.getElementById("stats"),
  filter: document.getElementById("filter"),
  hideStaged: document.getElementById("hide-staged"),
  list: document.getElementById("sidebar-list"),
  title: document.getElementById("current-title"),
  area: document.getElementById("compare-area"),
  diff: document.getElementById("diff-info"),
  gitAdd: document.getElementById("git-add-btn"),
};

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[char]));
}

function imageUrl(kind, change) {
  const path = kind === "before" ? change.beforePath : change.path;
  return `/image/${kind}?path=${encodeURIComponent(path)}&t=${Date.now()}`;
}

async function loadChanges(keepPath) {
  els.stats.textContent = "Loading...";
  const res = await fetch("/api/changes?t=" + Date.now());
  changes = await res.json();
  buildSidebar();

  if (keepPath) {
    const nextIndex = filtered.findIndex((change) => change.path === keepPath);
    if (nextIndex >= 0) {
      select(nextIndex);
      return;
    }
  }

  if (filtered.length > 0) {
    select(Math.min(Math.max(currentIndex, 0), filtered.length - 1));
  } else {
    showDone();
  }
}

function buildSidebar() {
  const query = els.filter.value.trim().toLowerCase();
  const hideStaged = els.hideStaged.checked;

  filtered = changes.filter((change) => {
    const haystack = `${change.path} ${change.beforePath} ${change.status}`.toLowerCase();
    return (!query || haystack.includes(query)) && !(hideStaged && change.staged);
  });

  const stagedCount = changes.filter((change) => change.staged).length;
  const dirs = new Set(filtered.map((change) => change.directory)).size;
  els.stats.textContent = `${filtered.length} visible, ${changes.length} changed, ${stagedCount} staged, ${dirs} folders`;

  const groups = {};
  filtered.forEach((change, index) => {
    const groupName = change.directory || ".";
    if (!groups[groupName]) groups[groupName] = [];
    groups[groupName].push({ ...change, index });
  });

  els.list.innerHTML = "";
  Object.entries(groups).forEach(([directory, items]) => {
    const group = document.createElement("div");
    group.className = "group";

    const header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML = `<span class="arrow">v</span><span>${escapeHtml(directory)}</span>`;
    header.addEventListener("click", () => header.classList.toggle("collapsed"));
    group.appendChild(header);

    const itemWrap = document.createElement("div");
    itemWrap.className = "group-items";

    items.forEach((item) => {
      const row = document.createElement("div");
      row.className = "item" + (item.index === currentIndex ? " active" : "");
      row.dataset.index = String(item.index);
      row.innerHTML = `
        <div class="item-title">${escapeHtml(item.name)}</div>
        <div class="item-path">${escapeHtml(item.path)}</div>
        <div class="item-status">
          <span class="badge ${escapeHtml(item.status)}">${escapeHtml(item.status)}</span>
          ${item.staged ? '<span class="badge staged">staged</span>' : ""}
        </div>`;
      row.addEventListener("click", () => select(item.index));
      itemWrap.appendChild(row);
    });

    group.appendChild(itemWrap);
    els.list.appendChild(group);
  });
}

function select(index) {
  if (index < 0 || index >= filtered.length) return;
  currentIndex = index;
  const change = filtered[index];
  els.title.textContent = change.path;
  document.querySelectorAll(".item").forEach((row) => {
    row.classList.toggle("active", Number(row.dataset.index) === currentIndex);
  });
  const active = document.querySelector(".item.active");
  if (active) active.scrollIntoView({ block: "nearest" });
  updateGitAdd();
  render();
  computeDiff(change);
}

function showDone() {
  stopBlink();
  currentIndex = -1;
  els.title.textContent = "No visible image changes";
  els.diff.textContent = "";
  els.area.innerHTML = '<div class="empty">No uncommitted image changes to review.</div>';
  updateGitAdd();
}

function navigate(delta) {
  if (filtered.length === 0) return;
  let next = currentIndex + delta;
  if (next < 0) next = filtered.length - 1;
  if (next >= filtered.length) next = 0;
  select(next);
}

function setMode(nextMode) {
  mode = nextMode;
  document.querySelectorAll(".modes button").forEach((button) => {
    button.classList.toggle("active", button.dataset.mode === mode);
  });
  if (currentIndex >= 0) render();
}

function render() {
  stopBlink();
  const change = filtered[currentIndex];
  if (!change) return;

  if (!change.hasBefore || !change.hasAfter) {
    renderSideBySide(change);
    return;
  }

  if (mode === "sidebyside") {
    renderSideBySide(change);
    return;
  }

  if (mode === "blink") {
    renderBlink(change);
    return;
  }

  const beforeSrc = imageUrl("before", change);
  const afterSrc = imageUrl("after", change);
  els.area.innerHTML = `
    <div class="slider-stack">
      <div class="slider-percentages">
        <span id="after-percent">After 50%</span>
        <span id="before-percent">Before 50%</span>
      </div>
      <div class="slider-container" id="slider">
        <img class="before-img" src="${beforeSrc}" draggable="false" alt="Before">
        <div class="after-wrap" id="after-wrap">
          <img src="${afterSrc}" draggable="false" alt="After">
        </div>
        <div class="slider-line" id="slider-line">
          <div class="slider-handle"></div>
        </div>
      </div>
    </div>`;
  initSlider();
}

function renderSideBySide(change) {
  const before = change.hasBefore
    ? `<img src="${imageUrl("before", change)}" draggable="false" alt="Before">`
    : '<div class="missing">No image in HEAD</div>';
  const after = change.hasAfter
    ? `<img src="${imageUrl("after", change)}" draggable="false" alt="After">`
    : '<div class="missing">No image in working tree</div>';

  els.area.innerHTML = `
    <div class="sidebyside">
      <div class="panel">
        <div class="panel-label">Before: HEAD${change.beforePath !== change.path ? " / " + escapeHtml(change.beforePath) : ""}</div>
        ${before}
      </div>
      <div class="panel">
        <div class="panel-label">After: working tree</div>
        ${after}
      </div>
    </div>`;
}

function stopBlink() {
  if (blinkTimer !== null) {
    clearInterval(blinkTimer);
    blinkTimer = null;
  }
}

function startBlink() {
  stopBlink();
  if (blinkPaused) return;
  blinkTimer = setInterval(() => {
    const stage = document.querySelector(".blink-stage");
    if (!stage) {
      stopBlink();
      return;
    }
    blinkShowingBefore = !blinkShowingBefore;
    stage.classList.toggle("show-before", blinkShowingBefore);
    const label = document.getElementById("blink-current");
    if (label) {
      label.textContent = blinkShowingBefore ? "Before" : "After";
      label.className = "blink-label " + (blinkShowingBefore ? "before" : "after");
    }
  }, blinkSpeed);
}

function renderBlink(change) {
  blinkShowingBefore = true;
  const pauseLabel = blinkPaused ? "Play" : "Pause";
  const speedButton = (ms, label) =>
    `<button data-speed="${ms}" class="${blinkSpeed === ms ? "active" : ""}">${label}</button>`;

  els.area.innerHTML = `
    <div class="blink-stack">
      <div class="blink-bar">
        <span class="blink-label before" id="blink-current">Before</span>
        <div class="blink-controls">
          <button id="blink-pause">${pauseLabel}</button>
          ${speedButton(1000, "Slow")}
          ${speedButton(500, "Med")}
          ${speedButton(200, "Fast")}
        </div>
      </div>
      <div class="blink-stage show-before">
        <img class="before-img" src="${imageUrl("before", change)}" draggable="false" alt="Before">
        <img class="after-img" src="${imageUrl("after", change)}" draggable="false" alt="After">
      </div>
    </div>`;

  const stage = document.querySelector(".blink-stage");
  const beforeImg = stage.querySelector(".before-img");
  const afterImg = stage.querySelector(".after-img");
  const syncSize = () => {
    afterImg.style.width = beforeImg.offsetWidth + "px";
    afterImg.style.height = beforeImg.offsetHeight + "px";
  };
  if (beforeImg.complete) syncSize();
  else beforeImg.addEventListener("load", syncSize, { once: true });

  document.getElementById("blink-pause").addEventListener("click", toggleBlinkPause);
  document.querySelectorAll(".blink-controls button[data-speed]").forEach((btn) => {
    btn.addEventListener("click", () => {
      blinkSpeed = parseInt(btn.dataset.speed, 10);
      document.querySelectorAll(".blink-controls button[data-speed]").forEach((b) => {
        b.classList.toggle("active", b.dataset.speed === btn.dataset.speed);
      });
      if (!blinkPaused) startBlink();
    });
  });

  startBlink();
}

function toggleBlinkPause() {
  blinkPaused = !blinkPaused;
  const btn = document.getElementById("blink-pause");
  if (btn) btn.textContent = blinkPaused ? "Play" : "Pause";
  if (blinkPaused) stopBlink();
  else startBlink();
}

function initSlider() {
  const slider = document.getElementById("slider");
  const wrap = document.getElementById("after-wrap");
  const line = document.getElementById("slider-line");
  if (!slider || !wrap || !line) return;

  let dragging = false;

  function update(ratio) {
    const clamped = Math.max(0, Math.min(1, ratio));
    const px = clamped * slider.offsetWidth;
    const afterPct = Math.round(clamped * 100);
    wrap.style.width = px + "px";
    line.style.left = px + "px";
    document.getElementById("after-percent").textContent = `After ${afterPct}%`;
    document.getElementById("before-percent").textContent = `Before ${100 - afterPct}%`;
  }

  const before = slider.querySelector(".before-img");
  const after = wrap.querySelector("img");
  function sizeAfter() {
    after.style.width = before.offsetWidth + "px";
    after.style.height = before.offsetHeight + "px";
    update(0.5);
  }

  if (before.complete) sizeAfter(); else before.addEventListener("load", sizeAfter, { once: true });

  slider.addEventListener("mousedown", (event) => {
    dragging = true;
    update(event.offsetX / slider.offsetWidth);
  });
  window.addEventListener("mousemove", (event) => {
    if (!dragging) return;
    const rect = slider.getBoundingClientRect();
    update((event.clientX - rect.left) / rect.width);
  });
  window.addEventListener("mouseup", () => {
    dragging = false;
  });
  slider.addEventListener("touchstart", (event) => {
    dragging = true;
    const rect = slider.getBoundingClientRect();
    update((event.touches[0].clientX - rect.left) / rect.width);
  });
  window.addEventListener("touchmove", (event) => {
    if (!dragging) return;
    const rect = slider.getBoundingClientRect();
    update((event.touches[0].clientX - rect.left) / rect.width);
  });
  window.addEventListener("touchend", () => {
    dragging = false;
  });
}

function computeDiff(change) {
  if (!change.hasBefore || !change.hasAfter) {
    els.diff.textContent = change.hasAfter ? "new image" : "deleted image";
    els.diff.className = "diff-info major";
    return;
  }

  const key = change.beforePath + "|" + change.path;
  if (diffCache.has(key)) {
    showDiff(diffCache.get(key));
    return;
  }

  els.diff.textContent = "computing...";
  els.diff.className = "diff-info";

  const before = new Image();
  const after = new Image();
  let loaded = 0;

  function fail() {
    els.diff.textContent = "diff unavailable";
    els.diff.className = "diff-info";
  }

  function loadedImage() {
    loaded += 1;
    if (loaded < 2) return;

    try {
      const width = Math.max(before.width, after.width);
      const height = Math.max(before.height, after.height);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      ctx.drawImage(before, 0, 0);
      const beforeData = ctx.getImageData(0, 0, width, height).data;

      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(after, 0, 0);
      const afterData = ctx.getImageData(0, 0, width, height).data;

      let diffPixels = 0;
      let totalDiff = 0;
      const totalPixels = width * height;

      for (let i = 0; i < beforeData.length; i += 4) {
        const dr = Math.abs(beforeData[i] - afterData[i]);
        const dg = Math.abs(beforeData[i + 1] - afterData[i + 1]);
        const db = Math.abs(beforeData[i + 2] - afterData[i + 2]);
        const da = Math.abs(beforeData[i + 3] - afterData[i + 3]);
        const maxDiff = Math.max(dr, dg, db, da);
        if (maxDiff > 0) diffPixels += 1;
        totalDiff += (dr + dg + db + da) / (4 * 255);
      }

      const result = {
        pixelPct: totalPixels ? (diffPixels / totalPixels) * 100 : 0,
        valuePct: totalPixels ? (totalDiff / totalPixels) * 100 : 0,
        sizeChanged: before.width !== after.width || before.height !== after.height,
      };
      diffCache.set(key, result);
      showDiff(result);
    } catch (error) {
      fail();
    }
  }

  before.onload = loadedImage;
  after.onload = loadedImage;
  before.onerror = fail;
  after.onerror = fail;
  before.src = imageUrl("before", change);
  after.src = imageUrl("after", change);
}

function showDiff(result) {
  const prefix = result.sizeChanged ? "size changed | " : "";
  if (result.pixelPct === 0 && !result.sizeChanged) {
    els.diff.textContent = "0% diff";
    els.diff.className = "diff-info identical";
    return;
  }
  els.diff.textContent = `${prefix}${result.pixelPct.toFixed(2)}% pixels | ${result.valuePct.toFixed(2)}% value`;
  els.diff.className = "diff-info " + (result.pixelPct < 5 ? "minor" : "major");
}

function updateGitAdd() {
  const change = filtered[currentIndex];
  if (!change) {
    els.gitAdd.disabled = true;
    els.gitAdd.className = "git-add";
    els.gitAdd.textContent = "Git Add";
    return;
  }
  if (change.staged) {
    els.gitAdd.disabled = true;
    els.gitAdd.className = "git-add staged";
    els.gitAdd.textContent = "Staged";
    return;
  }
  els.gitAdd.disabled = false;
  els.gitAdd.className = "git-add";
  els.gitAdd.textContent = "Git Add";
}

async function gitAddCurrent() {
  const change = filtered[currentIndex];
  if (!change || change.staged) return;

  els.gitAdd.disabled = true;
  els.gitAdd.textContent = "Adding...";

  const files = [change.path];
  if (change.beforePath !== change.path) files.push(change.beforePath);

  try {
    const res = await fetch("/git-add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ files }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "git add failed");

    change.staged = true;
    const allIndex = changes.findIndex((item) => item.path === change.path);
    if (allIndex >= 0) changes[allIndex].staged = true;
    buildSidebar();
    if (els.hideStaged.checked) {
      if (filtered.length === 0) showDone();
      else select(Math.min(currentIndex, filtered.length - 1));
    } else {
      updateGitAdd();
    }
  } catch (error) {
    console.error(error);
    els.gitAdd.disabled = false;
    els.gitAdd.textContent = "Error";
    setTimeout(updateGitAdd, 1500);
  }
}

els.filter.addEventListener("input", () => {
  const current = filtered[currentIndex]?.path;
  buildSidebar();
  const nextIndex = current ? filtered.findIndex((change) => change.path === current) : -1;
  if (nextIndex >= 0) select(nextIndex);
  else if (filtered.length > 0) select(0);
  else showDone();
});
els.hideStaged.addEventListener("change", () => {
  const current = filtered[currentIndex]?.path;
  buildSidebar();
  const nextIndex = current ? filtered.findIndex((change) => change.path === current) : -1;
  if (nextIndex >= 0) select(nextIndex);
  else if (filtered.length > 0) select(0);
  else showDone();
});
document.getElementById("prev-btn").addEventListener("click", () => navigate(-1));
document.getElementById("next-btn").addEventListener("click", () => navigate(1));
document.getElementById("git-add-btn").addEventListener("click", gitAddCurrent);
document.getElementById("refresh-btn").addEventListener("click", () => loadChanges(filtered[currentIndex]?.path));
document.querySelectorAll(".modes button").forEach((button) => {
  button.addEventListener("click", () => setMode(button.dataset.mode));
});

document.addEventListener("keydown", (event) => {
  if (event.target.tagName === "INPUT") return;
  if (event.key === "j" || event.key === "ArrowDown") {
    event.preventDefault();
    navigate(1);
  } else if (event.key === "k" || event.key === "ArrowUp") {
    event.preventDefault();
    navigate(-1);
  } else if (event.key === "1") {
    setMode("slider");
  } else if (event.key === "2") {
    setMode("sidebyside");
  } else if (event.key === "3") {
    setMode("blink");
  } else if (event.key === " " && mode === "blink") {
    event.preventDefault();
    toggleBlinkPause();
  } else if (event.key === "g" || event.key === "G") {
    gitAddCurrent();
  } else if (event.key === "/") {
    event.preventDefault();
    els.filter.focus();
  } else if (event.key === "Escape") {
    els.filter.blur();
  }
});

loadChanges();
</script>
</body>
</html>
