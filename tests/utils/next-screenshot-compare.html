<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Viewport: GPU vs CPU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 300px; min-width: 300px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; }
  .sidebar-header h2 { font-size: 14px; color: #4cc9f0; margin-bottom: 8px; }
  .sidebar-header .stats { font-size: 12px; color: #888; }
  .sidebar-filter { padding: 8px 16px; border-bottom: 1px solid #0f3460; }
  .sidebar-filter input { width: 100%; padding: 6px 10px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; font-size: 13px; outline: none; }
  .sidebar-filter input:focus { border-color: #4cc9f0; }
  .sidebar-list { flex: 1; overflow-y: auto; }
  .spec-group { border-bottom: 1px solid #0f3460; }
  .spec-group-header { padding: 8px 16px; font-size: 12px; color: #4cc9f0; background: #1a1a2e; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1; display: flex; align-items: center; gap: 6px; }
  .spec-group-header .arrow { transition: transform 0.2s; font-size: 10px; }
  .spec-group-header.collapsed .arrow { transform: rotate(-90deg); }
  .spec-group-items { }
  .spec-group-header.collapsed + .spec-group-items { display: none; }
  .item { padding: 6px 16px 6px 28px; font-size: 13px; cursor: pointer; transition: background 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item:hover { background: #1a1a2e; }
  .item.active { background: #0f3460; color: #fff; }
  .item.gpu-only { color: #888; font-style: italic; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
  .toolbar .title { font-size: 14px; font-weight: 600; flex: 1; min-width: 200px; }
  .toolbar .mode-btns { display: flex; gap: 4px; }
  .toolbar .mode-btns button { padding: 4px 12px; font-size: 12px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; cursor: pointer; border-radius: 4px; }
  .toolbar .mode-btns button.active { background: #4cc9f0; border-color: #4cc9f0; color: #1a1a2e; }
  .toolbar .nav-btns { display: flex; gap: 4px; }
  .toolbar .nav-btns button { padding: 4px 10px; font-size: 12px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; cursor: pointer; border-radius: 4px; }
  .toolbar .nav-btns button:hover { border-color: #4cc9f0; }
  .diff-info { font-size: 12px; padding: 4px 10px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
  .diff-info.identical { color: #40916c; }
  .diff-info.minor { color: #e9c46a; }
  .diff-info.major { color: #e94560; }

  .compare-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }

  /* Slider mode */
  .slider-container { position: relative; display: inline-block; cursor: col-resize; user-select: none; }
  .slider-container img { display: block; max-width: 80vw; max-height: 80vh; image-rendering: pixelated; }
  .slider-container .img-gpu { position: relative; }
  .slider-container .img-cpu-wrap { position: absolute; top: 0; left: 0; height: 100%; overflow: hidden; pointer-events: none; }
  .slider-container .img-cpu-wrap img { display: block; image-rendering: pixelated; }
  .slider-line { position: absolute; top: 0; height: 100%; width: 2px; background: #4cc9f0; pointer-events: none; z-index: 2; }
  .slider-label { position: absolute; top: 8px; padding: 2px 8px; font-size: 11px; border-radius: 3px; pointer-events: none; z-index: 3; white-space: nowrap; }
  .slider-label.left { right: 100%; margin-right: 12px; background: #0f3460; color: #e0e0e0; }
  .slider-label.right { left: 100%; margin-left: 12px; background: #4cc9f0; color: #1a1a2e; }
  .slider-handle { position: absolute; top: 50%; width: 32px; height: 32px; margin-top: -16px; margin-left: -16px; background: #4cc9f0; border-radius: 50%; z-index: 3; pointer-events: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(76,201,240,0.5); }
  .slider-handle::before { content: "<>"; font-size: 12px; color: #1a1a2e; }

  /* Side-by-side mode */
  .sidebyside { display: flex; gap: 20px; align-items: flex-start; }
  .sidebyside .panel { text-align: center; }
  .sidebyside .panel img { max-width: 38vw; max-height: 80vh; image-rendering: pixelated; display: block; }
  .sidebyside .panel-label { font-size: 12px; padding: 6px; color: #888; }

  /* Diff mode */
  .diff-container { position: relative; display: inline-block; }
  .diff-container img { display: block; max-width: 80vw; max-height: 80vh; image-rendering: pixelated; }
  .diff-container .diff-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; mix-blend-mode: difference; }

  /* Keyboard hints */
  .kbd-hints { position: fixed; bottom: 12px; right: 12px; font-size: 11px; color: #555; }
  .kbd-hints kbd { background: #16213e; border: 1px solid #0f3460; padding: 1px 5px; border-radius: 3px; font-family: inherit; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>GPU vs CPU</h2>
    <div class="stats" id="stats"></div>
  </div>
  <div class="sidebar-filter">
    <input type="text" id="filter" placeholder="Filter screenshots..." />
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="title" id="current-title">Select a screenshot</div>
    <div class="nav-btns">
      <button onclick="navigate(-1)">Prev</button>
      <button onclick="navigate(1)">Next</button>
    </div>
    <div class="mode-btns">
      <button class="active" data-mode="slider" onclick="setMode('slider')">Slider</button>
      <button data-mode="sidebyside" onclick="setMode('sidebyside')">Side by Side</button>
      <button data-mode="diff" onclick="setMode('diff')">Diff</button>
    </div>
    <span class="diff-info" id="diff-info"></span>
  </div>
  <div class="compare-area" id="compare-area">
    <div style="color:#555; font-size: 14px;">Select a screenshot from the sidebar, or press <kbd>J</kbd> / <kbd>K</kbd> to navigate.</div>
  </div>
</div>

<div class="kbd-hints">
  <kbd>J</kbd>/<kbd>K</kbd> navigate &nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> mode &nbsp; <kbd>/</kbd> filter
</div>

<script>
let PAIRS = [];

const BASE = "/screenshots/chromium/nextViewport/";
let currentIndex = -1;
let mode = "slider";
let filteredPairs = [];

async function loadPairs() {
  const res = await fetch("/api/pairs");
  PAIRS = await res.json();
  buildSidebar();
  if (filteredPairs.length > 0) selectPair(0);
}

function buildSidebar() {
  const list = document.getElementById("sidebar-list");
  const filter = document.getElementById("filter").value.toLowerCase();

  filteredPairs = PAIRS.filter(p =>
    p.spec.toLowerCase().includes(filter) || p.name.toLowerCase().includes(filter)
  );

  const paired = filteredPairs.filter(p => p.cpu);
  const gpuOnly = filteredPairs.filter(p => !p.cpu);
  document.getElementById("stats").textContent = `${paired.length} pairs, ${gpuOnly.length} GPU-only across ${new Set(filteredPairs.map(p=>p.spec)).size} specs`;

  const groups = {};
  filteredPairs.forEach((p, i) => {
    if (!groups[p.spec]) groups[p.spec] = [];
    groups[p.spec].push({ ...p, index: i });
  });

  list.innerHTML = "";
  for (const [spec, items] of Object.entries(groups)) {
    const group = document.createElement("div");
    group.className = "spec-group";

    const header = document.createElement("div");
    header.className = "spec-group-header";
    header.innerHTML = `<span class="arrow">&#9660;</span> ${spec.replace(".spec.ts", "")}`;
    header.onclick = () => header.classList.toggle("collapsed");
    group.appendChild(header);

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "spec-group-items";
    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item" + (item.index === currentIndex ? " active" : "") + (item.cpu ? "" : " gpu-only");
      el.textContent = item.name + (item.cpu ? "" : " (GPU only)");
      el.dataset.index = item.index;
      el.onclick = () => selectPair(item.index);
      itemsDiv.appendChild(el);
    });
    group.appendChild(itemsDiv);
    list.appendChild(group);
  }
}

function selectPair(index) {
  if (index < 0 || index >= filteredPairs.length) return;
  currentIndex = index;
  const pair = filteredPairs[currentIndex];
  document.getElementById("current-title").textContent = `${pair.spec.replace(".spec.ts", "")} / ${pair.name}`;
  if (pair.cpu) {
    computeDiff(pair);
  } else {
    const info = document.getElementById("diff-info");
    info.textContent = "GPU only (no CPU screenshot)";
    info.className = "diff-info";
  }

  document.querySelectorAll(".item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.index) === currentIndex);
  });
  const activeEl = document.querySelector(".item.active");
  if (activeEl) activeEl.scrollIntoView({ block: "nearest" });

  render();
}

function navigate(dir) {
  if (filteredPairs.length === 0) return;
  let next = currentIndex + dir;
  if (next < 0) next = filteredPairs.length - 1;
  if (next >= filteredPairs.length) next = 0;
  selectPair(next);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-btns button").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === m);
  });
  if (currentIndex >= 0) render();
}

function render() {
  const area = document.getElementById("compare-area");
  const pair = filteredPairs[currentIndex];
  const bust = "?t=" + Date.now();
  const gpuSrc = BASE + pair.gpu + bust;

  if (!pair.cpu) {
    area.innerHTML = `
      <div style="text-align:center">
        <div style="font-size:12px;color:#888;margin-bottom:8px">GPU</div>
        <img src="${gpuSrc}" style="max-width:80vw;max-height:80vh;image-rendering:pixelated" draggable="false" />
      </div>`;
    return;
  }

  const cpuSrc = BASE + pair.cpu + bust;

  if (mode === "slider") {
    area.innerHTML = `
      <div class="slider-container" id="slider">
        <img class="img-gpu" src="${gpuSrc}" draggable="false" />
        <div class="img-cpu-wrap" id="cpu-wrap">
          <img src="${cpuSrc}" draggable="false" />
        </div>
        <div class="slider-line" id="slider-line">
          <div class="slider-label left">GPU</div>
          <div class="slider-label right">CPU</div>
          <div class="slider-handle"></div>
        </div>
      </div>`;
    initSlider();
  } else if (mode === "sidebyside") {
    area.innerHTML = `
      <div class="sidebyside">
        <div class="panel">
          <div class="panel-label">GPU</div>
          <img src="${gpuSrc}" draggable="false" />
        </div>
        <div class="panel">
          <div class="panel-label">CPU</div>
          <img src="${cpuSrc}" draggable="false" />
        </div>
      </div>`;
  } else if (mode === "diff") {
    area.innerHTML = `
      <div class="diff-container">
        <img src="${gpuSrc}" draggable="false" />
        <img class="diff-overlay" src="${cpuSrc}" draggable="false" />
      </div>
      <div style="position:absolute;bottom:12px;left:20px;font-size:11px;color:#888;">
        Black = identical pixels. Colored = differences.
      </div>`;
  }
}

function initSlider() {
  const slider = document.getElementById("slider");
  const wrap = document.getElementById("cpu-wrap");
  const line = document.getElementById("slider-line");
  if (!slider) return;

  let dragging = false;

  function updateSlider(ratio) {
    ratio = Math.max(0, Math.min(1, ratio));
    const w = slider.offsetWidth;
    const px = ratio * w;
    wrap.style.width = px + "px";
    line.style.left = px + "px";
  }

  const img = slider.querySelector(".img-gpu");
  const cpuImg = wrap.querySelector("img");
  function setInitial() {
    cpuImg.style.width = img.offsetWidth + "px";
    cpuImg.style.height = img.offsetHeight + "px";
    updateSlider(0.5);
  }
  if (img.complete) setInitial(); else img.onload = setInitial;

  slider.addEventListener("mousedown", (e) => { dragging = true; updateSlider(e.offsetX / slider.offsetWidth); });
  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = slider.getBoundingClientRect();
    updateSlider((e.clientX - rect.left) / rect.width);
  });
  window.addEventListener("mouseup", () => { dragging = false; });

  slider.addEventListener("touchstart", (e) => {
    dragging = true;
    const rect = slider.getBoundingClientRect();
    updateSlider((e.touches[0].clientX - rect.left) / rect.width);
  });
  window.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    const rect = slider.getBoundingClientRect();
    updateSlider((e.touches[0].clientX - rect.left) / rect.width);
  });
  window.addEventListener("touchend", () => { dragging = false; });
}

const diffCache = {};

function computeDiff(pair) {
  const key = pair.gpu + "|" + pair.cpu;
  if (diffCache[key] !== undefined) { showDiff(diffCache[key]); return; }

  const info = document.getElementById("diff-info");
  info.textContent = "computing...";
  info.className = "diff-info";

  const imgA = new Image();
  const imgB = new Image();
  let loaded = 0;

  function onLoad() {
    if (++loaded < 2) return;
    const w = Math.max(imgA.width, imgB.width);
    const h = Math.max(imgA.height, imgB.height);
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(imgA, 0, 0);
    const dataA = ctx.getImageData(0, 0, w, h).data;

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(imgB, 0, 0);
    const dataB = ctx.getImageData(0, 0, w, h).data;

    let totalDiff = 0;
    let diffPixels = 0;
    const totalPixels = w * h;

    for (let i = 0; i < dataA.length; i += 4) {
      const dr = Math.abs(dataA[i] - dataB[i]);
      const dg = Math.abs(dataA[i+1] - dataB[i+1]);
      const db = Math.abs(dataA[i+2] - dataB[i+2]);
      const maxD = Math.max(dr, dg, db);
      if (maxD > 0) diffPixels++;
      totalDiff += (dr + dg + db) / (3 * 255);
    }

    const result = {
      pctPixels: (diffPixels / totalPixels * 100),
      pctValue: (totalDiff / totalPixels * 100),
      diffPixels,
      totalPixels
    };
    diffCache[key] = result;
    showDiff(result);
  }

  imgA.onload = onLoad;
  imgB.onload = onLoad;
  const cb = "?t=" + Date.now();
  imgA.src = BASE + pair.gpu + cb;
  imgB.src = BASE + pair.cpu + cb;
}

function showDiff(result) {
  const info = document.getElementById("diff-info");
  if (result.pctPixels === 0) {
    info.textContent = "0% diff (identical)";
    info.className = "diff-info identical";
  } else {
    const cls = result.pctPixels < 5 ? "minor" : "major";
    info.textContent = `${result.pctPixels.toFixed(2)}% pixels differ | ${result.pctValue.toFixed(2)}% avg intensity diff`;
    info.className = "diff-info " + cls;
  }
}

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); navigate(1); }
  if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); navigate(-1); }
  if (e.key === "1") setMode("slider");
  if (e.key === "2") setMode("sidebyside");
  if (e.key === "3") setMode("diff");
  if (e.key === "/") { e.preventDefault(); document.getElementById("filter").focus(); }
  if (e.key === "Escape") { document.getElementById("filter").blur(); }
});

document.getElementById("filter").addEventListener("input", () => {
  const oldPair = currentIndex >= 0 ? filteredPairs[currentIndex] : null;
  buildSidebar();
  if (oldPair) {
    const newIdx = filteredPairs.findIndex(p => p.gpu === oldPair.gpu);
    if (newIdx >= 0) currentIndex = newIdx;
    else currentIndex = -1;
  }
});

loadPairs();
</script>
</body>
</html>
