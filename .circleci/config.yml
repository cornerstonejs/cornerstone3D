# Use the latest 2.1 version of CircleCI pipeline processing engine, see https://circleci.com/docs/2.0/configuration-reference/
version: 2.1

defaults: &defaults
  working_directory: ~/repo
  # https://circleci.com/docs/2.0/circleci-images/#language-image-variants
  docker:
    - image: cimg/node:20.18.1-browsers
      environment:
        TERM: xterm # Enable colors in term

commands:
  install_bun:
    steps:
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash -s "bun-v1.2.23"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV

jobs:
  CHECKOUT:
    <<: *defaults
    steps:
      - checkout
      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/repo/.npmrc
      - install_bun
      # SECURITY AUDIT - only when bun.lock has changed
      - run:
          name: 'Security Audit - High Risk Vulnerabilities'
          command: |
            git fetch origin main 2>/dev/null || true
            BASE_REF=$(git merge-base HEAD origin/main 2>/dev/null)
            if [[ -z "$BASE_REF" ]]; then
              echo "Could not determine base ref (e.g. shallow clone or no origin/main), skipping security audit."
              exit 0
            fi
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
            if ! echo "$CHANGED_FILES" | grep -qx 'bun.lock'; then
              echo "⏭️ bun.lock unchanged - skipping security audit."
              exit 0
            fi
            echo "🔍 bun.lock changed - running bun audit for security vulnerabilities..."
            echo "Checking for HIGH-RISK vulnerabilities..."

            # Define ignored vulnerabilities with comments
            IGNORED_VULNS=(
              "GHSA-5j98-mcp5-4vw2"  # CVE-2025-64756 - glob is strictly for building and CI/CD purposes
              "GHSA-3ppc-4f35-3m26"  # CVE-2026-26996 - minimatch via itk-wasm and glob is safe because it does NOT use the CLI
                                     # CVE-2026-26996 - minimatch via other packages are strictly for building and CI/CD purposes; no user supplied expressions are passed to minimatch
              "GHSA-7r86-cg39-jmmj"  # CVE-2026-27903 - minimatch same as above
              "GHSA-23c5-xmqv-rm74"  # CVE-2026-27904 - minimatch same as above
              "GHSA-c2c7-rcm5-vvqj"  # CVE-2026-33671 - picomatch is generally used for development and CI/CD purposes
            )

            # Build ignore flags
            IGNORE_FLAGS=""
            for vuln in "${IGNORED_VULNS[@]}"; do
              IGNORE_FLAGS="$IGNORE_FLAGS --ignore=$vuln"
            done

            if bun audit $IGNORE_FLAGS --audit-level high; then
              echo "✅ No high-risk vulnerabilities found"
              echo "🎉 Security audit passed!"
            else
              echo ""
              echo "❌ HIGH-RISK VULNERABILITIES DETECTED!"
              echo "======================================"
              echo ""
              echo "🔧 To fix these issues:"
              echo "  1. Run: bun audit"
              echo "  2. Review the vulnerability details"
              echo "  3. Update affected packages to secure versions"
              echo "  4. Test your changes"
              echo "  5. Re-run: bun audit --audit-level high"
              echo ""
              echo "📋 Full audit report:"

              bun audit $IGNORE_FLAGS --audit-level low || true

              echo ""
              echo "❌ This build cannot proceed until high-risk vulnerabilities are resolved."
              exit 1
            fi
      - run: bun install
      - persist_to_workspace:
          root: ~/repo
          paths:
            - '.'

  BUILD:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/repo
      - install_bun
      - run:
          name: 'Perform the versioning before build'
          command: bun ./version.mjs
      - run: bun run build
      - persist_to_workspace:
          root: ~/repo
          paths:
            - packages/core/dist
            - packages/tools/dist
            - packages/adapters/dist
            - packages/dicomImageLoader/dist
            - packages/nifti-volume-loader/dist
            - version.txt
            - commit.txt
            - version.json

  NPM_PUBLISH:
    <<: *defaults
    resource_class: small
    steps:
      - attach_workspace:
          at: ~/repo
      - install_bun
      - run:
          name: Avoid hosts unknown for github
          command:
            mkdir ~/.ssh/ && echo -e "Host github.com\n\tStrictHostKeyChecking
            no\n" > ~/.ssh/config
      - add_ssh_keys:
          fingerprints:
            - '7e:0f:5b:bb:e3:7a:2e:2f:b4:85:bd:66:09:69:cb:f2'
      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - run: git config --global user.email "contact@ohif.org"
      - run: git config --global user.name "ohif-bot"
      - run:
          name: publish package versions
          command: |
            bun ./publish-version.mjs
      - run:
          name: create GitHub release from version tag
          command: |
            if [ -z "$GH_TOKEN" ]; then
              echo "GH_TOKEN is required to create GitHub releases."
              exit 1
            fi

            if [ ! -f ./version.txt ]; then
              echo "version.txt was not found; cannot create release."
              exit 1
            fi

            VERSION=$(tr -d '\r\n' < ./version.txt)
            TAG="v${VERSION}"
            IS_PRERELEASE=false

            if [ "$CIRCLE_BRANCH" = "beta" ]; then
              IS_PRERELEASE=true
            fi

            RELEASE_PAYLOAD=$(cat \<<EOF
            {
              "tag_name": "${TAG}",
              "target_commitish": "${CIRCLE_SHA1}",
              "name": "${TAG}",
              "body": "Automated release for ${TAG}",
              "draft": false,
              "prerelease": ${IS_PRERELEASE},
              "generate_release_notes": true
            }
            EOF
            )

            HTTP_CODE=$(curl -sS -o /tmp/create-release-response.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases" \
              -d "${RELEASE_PAYLOAD}")

            if [ "$HTTP_CODE" = "201" ]; then
              echo "Created GitHub release for ${TAG}."
            elif [ "$HTTP_CODE" = "422" ]; then
              echo "Release for ${TAG} already exists; treating as success."
            else
              echo "Failed to create release. HTTP status: $HTTP_CODE"
              cat /tmp/create-release-response.json
              exit 1
            fi
      - run:
          name: Again set the NPM registry (was deleted in the version script)
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/repo/.npmrc
      - run:
          name: publish package dist
          command: |
            bun ./publish-package.mjs

workflows:
  version: 2

  # PULL REQUEST
  PULL_REQUEST:
    jobs:
      - CHECKOUT:
          filters:
            branches:
              ignore:
                - main
                - feature/*
                - hotfix/*
      - BUILD:
          requires:
            - CHECKOUT

  # MERGE TO MAIN
  TEST_AND_RELEASE:
    jobs:
      - CHECKOUT:
          filters:
            branches:
              only:
                - main
                - beta
      - BUILD:
          requires:
            - CHECKOUT
      - NPM_PUBLISH:
          requires:
            - BUILD
# VS Code Extension Version: 1.5.1
