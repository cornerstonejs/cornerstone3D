# Use the latest 2.1 version of CircleCI pipeline processing engine, see https://circleci.com/docs/2.0/configuration-reference/
version: 2.1

defaults: &defaults
  working_directory: ~/repo
  # https://circleci.com/docs/2.0/circleci-images/#language-image-variants
  docker:
    - image: cimg/node:24.0-browsers
      environment:
        TERM: xterm # Enable colors in term

commands:
  install_pnpm:
    steps:
      - run:
          name: Install pnpm
          command: |
            # Use standalone installer to avoid corepack writing to /usr/local/bin (EACCES in CI)
            export SHELL=/bin/bash
            curl -fsSL https://get.pnpm.io/install.sh | env SHELL=/bin/bash PNPM_VERSION=10.5.2 sh -
            echo 'export PNPM_HOME="$HOME/.local/share/pnpm"' >> $BASH_ENV
            echo 'export PATH="$PNPM_HOME:$PATH"' >> $BASH_ENV

jobs:
  CHECKOUT:
    <<: *defaults
    steps:
      - checkout
      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/repo/.npmrc
      - install_pnpm
      # SECURITY AUDIT - only when pnpm-lock.yaml has changed
      - run:
          name: 'Security Audit - High Risk Vulnerabilities'
          command: |
            git fetch origin main 2>/dev/null || true
            BASE_REF=$(git merge-base HEAD origin/main 2>/dev/null)
            if [[ -z "$BASE_REF" ]]; then
              echo "Could not determine base ref (e.g. shallow clone or no origin/main), skipping security audit."
              exit 0
            fi
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
            if ! echo "$CHANGED_FILES" | grep -qx 'pnpm-lock.yaml'; then
              echo "⏭️ pnpm-lock.yaml unchanged - skipping security audit."
              exit 0
            fi
            echo "🔍 pnpm-lock.yaml changed - running pnpm audit for security vulnerabilities..."
            echo "Checking for HIGH-RISK vulnerabilities..."

            if pnpm audit --audit-level high; then
              echo "✅ No high-risk vulnerabilities found"
              echo "🎉 Security audit passed!"
            else
              echo ""
              echo "❌ HIGH-RISK VULNERABILITIES DETECTED!"
              echo "======================================"
              echo ""
              echo "🔧 To fix these issues:"
              echo "  1. Run: pnpm audit"
              echo "  2. Review the vulnerability details"
              echo "  3. Update affected packages to secure versions"
              echo "  4. Test your changes"
              echo "  5. Re-run: pnpm audit --audit-level high"
              echo ""
              echo "📋 Full audit report:"

              pnpm audit || true

              echo ""
              echo "❌ This build cannot proceed until high-risk vulnerabilities are resolved."
              exit 1
            fi
      - run: pnpm install
      - persist_to_workspace:
          root: ~/repo
          paths:
            - '.'

  BUILD:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/repo
      - install_pnpm
      - run:
          name: 'Perform the versioning before build'
          command: node ./version.mjs
      - run: pnpm run build
      - persist_to_workspace:
          root: ~/repo
          paths:
            - packages/core/dist
            - packages/tools/dist
            - packages/adapters/dist
            - packages/dicomImageLoader/dist
            - packages/nifti-volume-loader/dist
            - version.txt
            - commit.txt
            - version.json

  NPM_PUBLISH:
    <<: *defaults
    resource_class: small
    steps:
      - attach_workspace:
          at: ~/repo
      - install_pnpm
      - run:
          name: Avoid hosts unknown for github
          command:
            mkdir ~/.ssh/ && echo -e "Host github.com\n\tStrictHostKeyChecking
            no\n" > ~/.ssh/config
      - add_ssh_keys:
          fingerprints:
            - '7e:0f:5b:bb:e3:7a:2e:2f:b4:85:bd:66:09:69:cb:f2'
      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      - run: git config --global user.email "contact@ohif.org"
      - run: git config --global user.name "ohif-bot"
      - run:
          name: publish package versions
          command: |
            node ./publish-version.mjs
      - run:
          name: Again set the NPM registry (was deleted in the version script)
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/repo/.npmrc
      - run:
          name: publish package dist
          command: |
            node ./publish-package.mjs

workflows:
  version: 2

  # PULL REQUEST
  PULL_REQUEST:
    jobs:
      - CHECKOUT:
          filters:
            branches:
              ignore:
                - main
                - feature/*
                - hotfix/*
      - BUILD:
          requires:
            - CHECKOUT

  # MERGE TO MAIN
  TEST_AND_RELEASE:
    jobs:
      - CHECKOUT:
          filters:
            branches:
              only:
                - main
                # - beta
      - BUILD:
          requires:
            - CHECKOUT
      - NPM_PUBLISH:
          requires:
            - BUILD
