name: Validate ESM Packaging

# Guards the ESM packaging contract from https://github.com/cornerstonejs/cornerstone3D/issues/2763
# from regressing: every published @cornerstonejs/* package must ship ESM that
# resolves in bundlers AND native Node (correct `.js`/`.d.ts` extensions,
# `type:module`, clean publint + @arethetypeswrong). Runs on Node 24 and 25 —
# Node >=25 hard-fails on missing extensions, so it is the canary for this class
# of bug.

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-packaging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24', '25']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Validate ESM packaging (extensions, publint, attw, native-Node import)
        run: pnpm run validate:packaging
