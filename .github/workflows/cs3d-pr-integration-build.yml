# Build CS3D packages and publish tarballs to a GitHub prerelease when a PR has
# the ohif-integration label. Dispatches to the OHIF repo for integration testing.
name: CS3D PR integration build

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: cs3d-pr-integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-release:
    # Run only when the PR has the ohif-integration label.
    if: |
      github.event_name == 'pull_request' &&
      (contains(github.event.pull_request.labels.*.name, 'ohif-integration') ||
       (github.event.action == 'labeled' && github.event.label.name == 'ohif-integration'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out the PR head commit so we build and package the exact revision under test.
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable packages
        run: bun run build

      - name: Create npm tarballs
        run: "yarn release:tarballs"

      - name: Set release tag (deterministic: pr-number + short head SHA)
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          echo "tag=cs3d-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create or replace prerelease and upload tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Idempotent: remove existing release and tag so reruns overwrite cleanly.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" ./release-tarballs/*.tgz \
            --prerelease \
            --title "CS3D PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})" \
            --target "${{ github.event.pull_request.head.sha }}"

      - name: Dispatch to OHIF repo
        env:
          OHIF_REPO: ${{ vars.OHIF_INTEGRATION_REPO || secrets.OHIF_INTEGRATION_REPO }}
          DISPATCH_TOKEN: ${{ secrets.CS3D_TO_OHIF_APP_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ] || [ -z "$OHIF_REPO" ]; then
            echo "Skipping dispatch: CS3D_TO_OHIF_APP_TOKEN or OHIF repo not set."
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: token $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$OHIF_REPO/dispatches" \
            -d '{
              "event_type": "cs3d-integration",
              "client_payload": {
                "mode": "integration-only",
                "cs3d_pr_number": ${{ github.event.pull_request.number }},
                "cs3d_head_sha": "${{ github.event.pull_request.head.sha }}",
                "release_tag": "${{ steps.tag.outputs.tag }}",
                "source_repository": "${{ github.repository }}"
              }
            }'
