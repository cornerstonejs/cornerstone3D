name: Validate Codemod Registry Entries

on:
  pull_request:
    paths:
      - 'packages/codemods/**'
      - '.github/workflows/publish-codemod-registry.yml'
      - '.github/workflows/validate-codemod-registry.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/codemods/**'
      - '.github/workflows/publish-codemod-registry.yml'
      - '.github/workflows/validate-codemod-registry.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate registry packages
        run: pnpm --filter @cornerstonejs/codemods validate
