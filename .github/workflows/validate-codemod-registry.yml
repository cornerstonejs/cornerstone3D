name: Validate Codemod Registry Entries

on:
  pull_request:
    paths:
      - 'packages/codemods/**'
      - '.github/workflows/publish-codemod-registry.yml'
      - '.github/workflows/validate-codemod-registry.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/codemods/**'
      - '.github/workflows/publish-codemod-registry.yml'
      - '.github/workflows/validate-codemod-registry.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Validate registry packages
        run: yarn --cwd packages/codemods validate
