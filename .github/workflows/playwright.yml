name: Playwright Tests
on:
  pull_request:
    branches: [main, master, beta]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    timeout-minutes: 120
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Playwright tests
        env:
          CI: true
          PLAYWRIGHT_HTML_OPEN: never
        run: |
          export NODE_OPTIONS="--max_old_space_size=10192"
          pnpm exec nyc --reporter=html playwright test --max-failures=10 --retries=1
      - name: Upload Playwright report and test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.sha }}
          if-no-files-found: warn
          path: |
            tests/playwright-report/
            tests/test-results/
          retention-days: 7
      - name: create the coverage report
        run: |
          pnpm exec nyc report --reporter=lcov --reporter=text
      - name: Upload the coverage report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pr
          path: coverage
          retention-days: 7
