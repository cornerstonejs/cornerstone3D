name: Playwright Tests
on:
  pull_request:
    branches: [main, master, beta]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # - name: Install Playwright browsers
      #   run: bun x playwright install-deps chromium
      - name: Run Playwright tests
        run: |
          export NODE_OPTIONS="--max_old_space_size=10192"
          bun run test:e2e:coverage
      - name: Create directory of test results
        if: ${{ !cancelled() }}
        run: |
          mkdir -p packaged-test-results
          cp -r ./tests/test-results packaged-test-results/ || true
          cp ./tests/playwright-report.json packaged-test-results/ || true
          cp -r ./blob-report packaged-test-results/ || true
          # Keep all actual images, but reduce retry bloat:
          # - keep expected/diff images only for the final retry of each test
          # - keep only one video/trace per test across retries (highest retry wins)
          if [ -d "packaged-test-results/test-results" ]; then
            python - <<'PY'
            import os
            import re
            from collections import defaultdict

            root = "packaged-test-results/test-results"

            # Group retry folders by base test folder.
            # Example: foo-retry1, foo-retry2 -> base foo
            groups = defaultdict(list)
            retry_re = re.compile(r"^(?P<base>.+)-retry(?P<num>\d+)$")

            for dirpath, dirnames, _ in os.walk(root):
              for d in dirnames:
                m = retry_re.match(d)
                if m:
                  base = m.group("base")
                  n = int(m.group("num"))
                  groups[(dirpath, base)].append((n, os.path.join(dirpath, d)))
                elif not d.endswith("-retry"):
                  groups[(dirpath, d)].append((0, os.path.join(dirpath, d)))

            media_names = {"video.webm", "trace.zip"}
            image_exts = (".png", ".jpg", ".jpeg", ".snap")
            for (_, _), entries in groups.items():
              if not entries:
                continue
              # Keep retry-level artifacts only in the final attempt folder.
              keep_path = max(entries, key=lambda x: x[0])[1]
              for _, p in entries:
                if p == keep_path:
                  continue
                # From earlier retries, remove expected/diff artifacts only.
                for dirpath, _, filenames in os.walk(p):
                  for name in filenames:
                    lower = name.lower()
                    if lower.endswith(image_exts) and (("expected" in lower) or ("diff" in lower)):
                      fp = os.path.join(dirpath, name)
                      if os.path.exists(fp):
                        try:
                          os.remove(fp)
                        except FileNotFoundError:
                          pass
                # Keep only final retry's media.
                for media in media_names:
                  fp = os.path.join(p, media)
                  if os.path.exists(fp):
                    try:
                      os.remove(fp)
                    except FileNotFoundError:
                      pass
            PY
          fi
      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: packaged-test-results/
          retention-days: 5
      - name: create the coverage report
        run: |
          bun nyc report --reporter=lcov --reporter=text
      - name: Upload the coverage report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pr
          path: coverage
          retention-days: 7
